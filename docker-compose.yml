services:
  db:
    image: postgres:16-alpine
    container_name: optical-system-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-optical_db}
      POSTGRES_USER: ${DB_USERNAME:-optical_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    command:
      - postgres
      - -c
      - max_connections=${DB_MAX_CONNECTIONS:-20}
      - -c
      - shared_buffers=${DB_SHARED_BUFFERS:-32MB}
      - -c
      - effective_cache_size=${DB_EFFECTIVE_CACHE_SIZE:-96MB}
      - -c
      - maintenance_work_mem=${DB_MAINTENANCE_WORK_MEM:-16MB}
      - -c
      - work_mem=${DB_WORK_MEM:-2MB}
      - -c
      - temp_buffers=${DB_TEMP_BUFFERS:-2MB}
      - -c
      - wal_buffers=${DB_WAL_BUFFERS:-2MB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 160m
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optical-system-app
    env_file:
      - .env
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-optical_db}
      DB_USERNAME: ${DB_USERNAME:-optical_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JAVA_OPTS: ${JAVA_OPTS:--Xms96m -Xmx160m -XX:MaxMetaspaceSize=96m -XX:ReservedCodeCacheSize=32m -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom}
      DB_MAX_POOL_SIZE: ${DB_MAX_POOL_SIZE:-4}
      DB_MIN_IDLE: ${DB_MIN_IDLE:-0}
      DB_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT:-20000}
      DB_IDLE_TIMEOUT: ${DB_IDLE_TIMEOUT:-300000}
      DB_MAX_LIFETIME: ${DB_MAX_LIFETIME:-600000}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-8}
      TOMCAT_MIN_SPARE_THREADS: ${TOMCAT_MIN_SPARE_THREADS:-2}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT:-20}
      SPRING_MAIN_LAZY_INITIALIZATION: ${SPRING_MAIN_LAZY_INITIALIZATION:-true}
      SPRINGDOC_ENABLED: ${SPRINGDOC_ENABLED:-false}
    ports:
      - "8080:8080"
    mem_limit: 320m
    restart: unless-stopped

volumes:
  postgres_data:
