server:
  port: ${SERVER_PORT:8080}
  shutdown: immediate
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:8}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:2}
    accept-count: ${TOMCAT_ACCEPT_COUNT:20}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:128}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:20000}
  error:
    include-message: never
    include-stacktrace: never

spring:
  main:
    lazy-initialization: ${SPRING_MAIN_LAZY_INITIALIZATION:true}
    banner-mode: off
  jmx:
    enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:optical_db}
    username: ${DB_USERNAME:optical_user}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    hikari:
      minimum-idle: ${DB_MIN_IDLE:0}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:4}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:20000}
      idle-timeout: ${DB_IDLE_TIMEOUT:300000}
      max-lifetime: ${DB_MAX_LIFETIME:600000}
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT:0}
      auto-commit: false
      transaction-isolation: TRANSACTION_READ_COMMITTED

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        default_batch_fetch_size: 20
        format_sql: true
        generate_statistics: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:25MB}
  mvc:
    log-request-details: false

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}

logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate: WARN

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

